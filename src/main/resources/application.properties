# =================================================================
# BUSINESS CONTRACTS MANAGER - BASE CONFIGURATION
# Enterprise-grade Spring Boot Configuration
# =================================================================

# Application Metadata
spring.application.name=bcm-backend

# Server Configuration
server.port=8090
server.servlet.context-path=/api/v1

# Spring Profiles
spring.profiles.active=@spring.profiles.active@

# Configuration Import
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bcm}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expirationMs=${JWT_EXPIRATION_MS:900000}
jwt.refreshExpirationMs=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Rate Limiting
rate-limit.requests-per-minute=${RATE_LIMIT_RPM:5}

# Local Storage Configuration
storage.upload-dir=${UPLOAD_DIR:uploads}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application URLs
app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:3000}
app.backend-base-url=${BACKEND_BASE_URL:http://localhost:8090/api/v1}

# Refresh-token cookie: Secure must be true whenever served over HTTPS
# (production). Overridden to false for local dev (plain http://localhost).
app.cookie-secure=${COOKIE_SECURE:true}

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# OpenAPI Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging Configuration
logging.level.com.donatodev.bcm_backend=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Development Tools (disabled by default)
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# ML Service Configuration
ml.fastapi.url=${ML_FASTAPI_URL:http://localhost:8000}
ml.internal-api-key=${ML_INTERNAL_API_KEY:}

# Disable mail health check (email service is optional in development)
management.health.mail.enabled=false